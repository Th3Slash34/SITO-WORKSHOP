<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Reattiva</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f5f0eb;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: system-ui, -apple-system, sans-serif;
}
#container {
  width: 98vmin;
  max-width: 1200px;
}
#container.active {
  filter: drop-shadow(0 0 25px rgba(192,57,43,0.35));
}
#radio-svg {
  width: 100%;
  height: auto;
}
.state-active, .state-inactive {
  transition: opacity 0.3s ease-in-out;
}
#container.inactive .state-active {
  opacity: 0;
}
#container.active .state-inactive {
  opacity: 0;
}
#CASSA {
  transition: transform 0.3s ease-in-out, filter 0.3s ease-in-out;
  transform-origin: 406.69px 336.91px;
}
#container.active #CASSA {
  animation: pulse 0.6s ease-in-out infinite;
}
#container.active #CASSA circle {
  filter: drop-shadow(0 0 18px rgba(192,57,43,0.5));
}
#SCHERMO line {
  transition: stroke 0.3s ease-in-out;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}
@keyframes jump {
  0% { transform: scale(1); }
  30% { transform: scale(1.12); }
  60% { transform: scale(0.95); }
  100% { transform: scale(1); }
}
#CASSA.jump {
  animation: jump 0.25s ease-out !important;
}
#ONDE_AUDIO {
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s ease-in-out;
}
#container.inactive #ONDE_AUDIO {
  transform-origin: 25px 140px;
  transform: scale(0);
  opacity: 0;
}
#container.active #ONDE_AUDIO {
  transform-origin: 180px 265px;
  transform: scale(1);
  opacity: 1;
}
#controls {
  margin-top: 24px;
  width: 98vmin;
  max-width: 1200px;
  text-align: center;
}
#controls label {
  display: block;
  margin-bottom: 8px;
  font-size: 0.9rem;
  color: #6b5b4e;
  letter-spacing: 0.5px;
}
#sensitivity {
  width: 100%;
  height: 6px;
  -webkit-appearance: none;
  appearance: none;
  background: #e0d6cd;
  border-radius: 3px;
  outline: none;
}
#sensitivity::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #c0392b;
  cursor: pointer;
  border: 2px solid #f5f0eb;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}
#sensitivity::-moz-range-thumb {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #c0392b;
  cursor: pointer;
  border: 2px solid #f5f0eb;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}
#volume-display {
  font-variant-numeric: tabular-nums;
  color: #c0392b;
  font-weight: 600;
}
</style>
</head>

<div id="controls">
  <label for="sensitivity">Sensibilità: <span id="sensitivity-value">70%</span>  |  Volume: <span id="volume-display">0.00</span></label>
  <input type="range" id="sensitivity" min="0" max="1" step="0.01" value="0.7">
</div>
<script>
const container = document.getElementById('container');
const ondeMove = document.getElementById('onde-move');
const cassa = document.getElementById('CASSA');
const sensitivityInput = document.getElementById('sensitivity');
const sensitivityValue = document.getElementById('sensitivity-value');
const volumeDisplay = document.getElementById('volume-display');
const barLines = document.querySelectorAll('#SCHERMO line');

let audioContext = null;
let analyser = null;
let dataArray = null;
let source = null;
let stream = null;
let isActive = false;
let animFrameId = null;
let barAnimId = null;

const HYSTERESIS_FACTOR = 1.05;
const BAR_INACTIVE_Y2 = 386.43;

function animateBars(activate) {
  if (barAnimId) { cancelAnimationFrame(barAnimId); }
  const targets = [];
  const colors = ['#c0392b','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#e74c3c'];
  barLines.forEach(line => {
    const from = parseFloat(line.getAttribute('y2'));
    const to = activate
      ? BAR_INACTIVE_Y2 - Math.random() * 60
      : BAR_INACTIVE_Y2;
    if (activate) {
      line.style.stroke = colors[Math.floor(Math.random() * colors.length)];
    } else {
      line.style.stroke = '#c0392b';
    }
    targets.push({ line, from, to });
  });
  const duration = 350;
  const start = performance.now();

  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    targets.forEach(({ line, from, to }) => {
      line.setAttribute('y2', from + (to - from) * ease);
    });
    if (t < 1) { barAnimId = requestAnimationFrame(step); }
  }

  barAnimId = requestAnimationFrame(step);
}

sensitivityInput.addEventListener('input', () => {
  const pct = Math.round(parseFloat(sensitivityInput.value) * 100);
  sensitivityValue.textContent = pct + '%';
});

async function initAudio() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 256;
    source = audioContext.createMediaStreamSource(stream);
    source.connect(analyser);
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    loop();
  } catch (err) {
    document.getElementById('controls').innerHTML = '<p style="color:#9e1a16;">Microfono non accessibile. Apri la pagina tramite HTTP (es. <code>python -m http.server 8000</code>) e non come file locale.</p>';
  }
}

function getVolume() {
  analyser.getByteFrequencyData(dataArray);
  let sum = 0;
  for (let i = 1; i < 20; i++) {
    sum += dataArray[i];
  }
  return sum / (19 * 255);
}

function loop() {
  const volume = getVolume();
  const threshold = 1 - parseFloat(sensitivityInput.value);
  const upper = threshold * HYSTERESIS_FACTOR;
  const lower = threshold / HYSTERESIS_FACTOR;

  volumeDisplay.textContent = volume.toFixed(3);

  if (!isActive && volume > upper) {
    isActive = true;
    container.className = 'active';
    animateBars(true);
  } else if (isActive && volume < lower) {
    isActive = false;
    container.className = 'inactive';
    animateBars(false);
  }

  if (isActive && volume > upper + 0.2 && !cassa.classList.contains('jump')) {
    cassa.classList.add('jump');
    setTimeout(() => cassa.classList.remove('jump'), 250);
  }

  if (isActive && ondeMove) {
    const offset = (volume - threshold) * 30;
    ondeMove.setAttribute('transform', `translate(0, ${-offset})`);
  }

  animFrameId = requestAnimationFrame(loop);
}

initAudio();
</script>
