<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Texture Generator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; }
.container { flex: 1; display: flex; background: #fff; position: relative; }
.preview { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.preview svg { display: block; max-width: 100%; max-height: 100%; }
.controls { position: fixed; top: 16px; right: 16px; width: 260px; display: flex; flex-direction: column; gap: 10px; padding: 16px; background: rgba(255,255,255,0.92); border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); z-index: 100; }
.controls h1 { font-size: 16px; font-weight: 600; color: #222; margin-bottom: 2px; }
.control-group { display: flex; flex-direction: column; gap: 4px; }
.control-group label { font-size: 13px; font-weight: 500; color: #444; }
.control-group input[type="number"] { width: 70px; padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
.control-group input[type="range"] { width: 100%; }
.control-row { display: flex; align-items: center; gap: 8px; }
.control-row .value { font-size: 13px; color: #666; min-width: 30px; }
.btn-row { display: flex; gap: 8px; margin-top: 8px; }
.btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 500; }
.btn-primary { background: #222; color: #fff; }
.btn-secondary { background: #e0e0e0; color: #222; }
.btn:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="container">
  <div class="preview">
  </div>
  <div class="controls">
    <h1>Texture Generator</h1>

    <div class="control-group">
      <label>Griglia</label>
      <div class="control-row">
        <input type="number" id="gridCols" min="2" max="20" value="5">
        <span>×</span>
        <input type="number" id="gridRows" min="2" max="20" value="5">
      </div>
    </div>

    <div class="control-group">
      <label>Dimensione quadrato</label>
      <div class="control-row">
        <input type="range" id="squareSize" min="10" max="100" value="40">
        <span class="value" id="squareSizeVal">40</span>
      </div>
    </div>

    <div class="control-group">
      <label>Spaziatura (× lato)</label>
      <div class="control-row">
        <input type="range" id="spacing" min="0.1" max="2.0" step="0.1" value="0.5">
        <span class="value" id="spacingVal">0.5</span>
      </div>
    </div>

    <div class="control-group">
      <label>Linee min</label>
      <div class="control-row">
        <input type="range" id="linesMin" min="1" max="10" value="1">
        <span class="value" id="linesMinVal">1</span>
      </div>
    </div>

    <div class="control-group">
      <label>Linee max</label>
      <div class="control-row">
        <input type="range" id="linesMax" min="1" max="10" value="3">
        <span class="value" id="linesMaxVal">3</span>
      </div>
    </div>

    <div class="control-group">
      <label>Quadrati</label>
      <div class="control-row">
        <select id="fillMode">
          <option value="empty">Vuoti</option>
          <option value="filled">Pieni</option>
        </select>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="generateBtn">Genera</button>
      <button class="btn btn-secondary" id="exportPngBtn">PNG</button>
      <button class="btn btn-secondary" id="exportSvgBtn">SVG</button>
    </div>
  </div>
</div>
<script>
function generateTexture(cols, rows, squareSize, spacingRatio, linesMin, linesMax) {
  const spacing = squareSize * spacingRatio;
  const cells = [];
  const activeCounts = [];

  // Step 1: assign active corner counts with horizontal constraint
  for (let r = 0; r < rows; r++) {
    activeCounts[r] = [];
    for (let c = 0; c < cols; c++) {
      const forbidden = new Set();
      if (c > 0) forbidden.add(activeCounts[r][c - 1]);
      const allowed = [];
      for (let k = 0; k <= 4; k++) {
        if (!forbidden.has(k)) allowed.push(k);
      }
      activeCounts[r][c] = allowed[Math.floor(Math.random() * allowed.length)];
    }
  }

  // Step 2: assign which corners are active for each cell
  // corners order: [TL, TR, BL, BR]
  const cornerDirs = [
    { dr: -1, dc: -1 },
    { dr: -1, dc: 1 },
    { dr: 1, dc: -1 },
    { dr: 1, dc: 1 }
  ];

  for (let r = 0; r < rows; r++) {
    cells[r] = [];
    for (let c = 0; c < cols; c++) {
      const count = activeCounts[r][c];
      const cornerIndices = [];
      const pool = [0, 1, 2, 3];
      for (let i = 0; i < count; i++) {
        const idx = Math.floor(Math.random() * pool.length);
        cornerIndices.push(pool[idx]);
        pool.splice(idx, 1);
      }
      cells[r][c] = { row: r, col: c, activeCorners: cornerIndices };
    }
  }

  // Step 3: compute connections
  const connections = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = cells[r][c];
      for (const ci of cell.activeCorners) {
        const dir = cornerDirs[ci];
        const nr = r + dir.dr;
        const nc = c + dir.dc;
        if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) continue;
        const srcPos = getCornerPos(r, c, ci, squareSize, spacing);
        const targetCorners = getTargetCorners(nr, nc, srcPos, squareSize, spacing);
        for (const tci of targetCorners) {
          const tgtPos = getCornerPos(nr, nc, tci, squareSize, spacing);
          const multiplicity = linesMin + Math.floor(Math.random() * (linesMax - linesMin + 1));
          connections.push({
            x1: srcPos.x, y1: srcPos.y,
            x2: tgtPos.x, y2: tgtPos.y,
            multiplicity: multiplicity
          });
        }
      }
    }
  }

  return { cols, rows, squareSize, spacing, cells, connections, activeCounts };
}

function getCornerPos(row, col, cornerIndex, size, spacing) {
  const x0 = col * (size + spacing);
  const y0 = row * (size + spacing);
  switch (cornerIndex) {
    case 0: return { x: x0, y: y0 };
    case 1: return { x: x0 + size, y: y0 };
    case 2: return { x: x0, y: y0 + size };
    case 3: return { x: x0 + size, y: y0 + size };
  }
}

function getTargetCorners(row, col, srcPos, size, spacing) {
  const x0 = col * (size + spacing);
  const y0 = row * (size + spacing);
  const corners = [
    { x: x0, y: y0 },
    { x: x0 + size, y: y0 },
    { x: x0, y: y0 + size },
    { x: x0 + size, y: y0 + size }
  ];
  const dists = corners.map((c, i) => ({
    idx: i,
    dist: Math.sqrt((c.x - srcPos.x) ** 2 + (c.y - srcPos.y) ** 2)
  }));
  dists.sort((a, b) => a.dist - b.dist);
  return [dists[0].idx, dists[1].idx];
}

function renderPreview(data) {
  const container = document.querySelector('.preview');
  container.innerHTML = generateSVGContent(data);
}

function generate() {
  const cols = parseInt(document.getElementById('gridCols').value);
  const rows = parseInt(document.getElementById('gridRows').value);
  const squareSize = parseInt(document.getElementById('squareSize').value);
  const spacingRatio = parseFloat(document.getElementById('spacing').value);
  const linesMin = parseInt(document.getElementById('linesMin').value);
  const linesMax = parseInt(document.getElementById('linesMax').value);

  const data = generateTexture(cols, rows, squareSize, spacingRatio, linesMin, linesMax);
  window._textureData = data;
  renderPreview(data);
}

document.getElementById('generateBtn').addEventListener('click', generate);
document.querySelectorAll('.controls .control-group input, .controls .control-group select').forEach(el => {
  el.addEventListener('input', function () {
    if (this.type === 'range') {
      const valEl = document.getElementById(this.id + 'Val');
      if (valEl) valEl.textContent = this.value;
    }
    generate();
  });
  el.addEventListener('change', generate);
});

generate();

function generateSVGContent(data) {
  const fillMode = document.getElementById('fillMode').value;
  const w = data.cols * (data.squareSize + data.spacing);
  const h = data.rows * (data.squareSize + data.spacing);
  const lineW = Math.max(0.5, data.squareSize / 40);
  const lineGap = data.squareSize / 8;
  let svg = '<svg id="preview" xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">\n';

  for (let r = 0; r < data.rows; r++) {
    for (let c = 0; c < data.cols; c++) {
      const x = c * (data.squareSize + data.spacing);
      const y = r * (data.squareSize + data.spacing);
      if (fillMode === 'filled') {
        svg += '<rect x="' + x + '" y="' + y + '" width="' + data.squareSize + '" height="' + data.squareSize + '" fill="black"/>\n';
      } else {
        svg += '<rect x="' + x + '" y="' + y + '" width="' + data.squareSize + '" height="' + data.squareSize + '" fill="none" stroke="black" stroke-width="' + lineW + '"/>\n';
      }
    }
  }

  for (const conn of data.connections) {
    const mx = (conn.x1 + conn.x2) / 2;
    const my = (conn.y1 + conn.y2) / 2;
    const dx = conn.x2 - conn.x1;
    const dy = conn.y2 - conn.y1;
    const len = Math.sqrt(dx * dx + dy * dy);
    const nx = len > 0 ? -dy / len : 0;
    const ny = len > 0 ? dx / len : 0;
    for (let i = 0; i < conn.multiplicity; i++) {
      const spread = (i - (conn.multiplicity - 1) / 2) * lineGap * 2;
      const cx = mx + nx * spread;
      const cy = my + ny * spread;
      svg += '<path d="M' + conn.x1 + ',' + conn.y1 + ' Q' + cx + ',' + cy + ' ' + conn.x2 + ',' + conn.y2 + '" fill="none" stroke="black" stroke-width="' + lineW + '"/>\n';
    }
  }

  svg += '</svg>';
  return svg;
}

function downloadFile(content, filename, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportPNG() {
  const svgEl = document.getElementById('preview');
  const svgData = new XMLSerializer().serializeToString(svgEl);
  const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = function () {
    const canvas = document.createElement('canvas');
    const texW = window._textureData.cols * (window._textureData.squareSize + window._textureData.spacing);
    const texH = window._textureData.rows * (window._textureData.squareSize + window._textureData.spacing);
    canvas.width = texW;
    canvas.height = texH;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);
    canvas.toBlob(function (blob) {
      const u = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = u;
      a.download = 'texture.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(u);
    });
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

function exportSVG() {
  const svgEl = document.getElementById('preview');
  const svgData = new XMLSerializer().serializeToString(svgEl);
  downloadFile(svgData, 'texture.svg', 'image/svg+xml');
}

document.getElementById('exportPngBtn').addEventListener('click', exportPNG);
document.getElementById('exportSvgBtn').addEventListener('click', exportSVG);
</script>
<button onclick="window.location.href='../codebase/index.html'" style="position:fixed;top:16px;right:16px;z-index:9999;font-family:'Press Start 2P',monospace;background:#222;color:#fff;border:2px solid #fff;padding:8px 12px;cursor:pointer;font-size:8px;line-height:1.4;box-shadow:4px 4px 0 rgba(0,0,0,0.3);">&#9664; TORNA ALLA HOME</button>
</body>
</html>
