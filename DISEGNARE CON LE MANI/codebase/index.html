<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MARIONETTA — Hand Tracking</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
    }
    #container {
      position: relative;
      width: 100%;
      max-width: 1200px;
      transform: scaleX(-1);
      background: #f0f0f0;
      border-radius: 12px;
    }
    #container.hide-video #video { opacity: 0; }
    #video {
      width: 100%;
      display: block;
      border-radius: 12px;
    }
    .layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #draw-canvas { z-index: 1; }
    #overlay { z-index: 2; }
    #grid-canvas { z-index: 3; }
    #toolbar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      background: rgba(0,0,0,0.7);
      padding: 6px;
      border-radius: 24px;
      backdrop-filter: blur(4px);
    }
    #toolbar button {
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      background: rgba(255,255,255,0.1);
      color: #fff;
      transition: 0.15s;
    }
    #toolbar button.active {
      background: rgba(255,255,255,0.3);
      box-shadow: 0 0 0 2px #ffd93d;
    }
    #toolbar button.eraser.active {
      box-shadow: 0 0 0 2px #ff4444;
    }
    #toolbar button.fill.active {
      box-shadow: 0 0 0 2px #6bcb77;
    }
    #toolbar input[type=range] {
      width: 80px;
      accent-color: #ffd93d;
      background: transparent;
    }
    #size-label {
      color: #fff;
      font-size: 13px;
      line-height: 40px;
      min-width: 24px;
      text-align: center;
    }
    #status {
      color: #aaa;
      font-size: 12px;
      padding: 8px 12px;
      line-height: 40px;
    }
    #btn-reset-grid { font-size: 16px; }
  </style>
</head>
<body>
  <div id="container">
    <video id="video" playsinline></video>
    <canvas id="draw-canvas" class="layer"></canvas>
    <canvas id="overlay" class="layer"></canvas>
    <canvas id="grid-canvas" class="layer"></canvas>
  </div>
  <div id="toolbar">
    <button id="btn-draw" class="active" title="Disegna">✏️</button>
    <button id="btn-eraser" class="eraser" title="Gomma">🧹</button>
    <button id="btn-fill" class="fill" title="Riempimento">🪣</button>
    <button id="btn-shape" title="Forme">⬜</button>
    <input type="color" id="color-picker" value="#ffd93d" title="Colore">
    <button id="btn-clear" title="Cancella tutto">🗑️</button>
    <button id="btn-bg" title="Sfondo" class="active">🌐</button>
    <button id="btn-export" title="Esporta">💾</button>
    <button id="btn-anima" title="Anima">🎭</button>
    <button id="btn-reset-grid" title="Reset griglia" style="display:none">🔄</button>
    <input type="range" id="size-slider" min="1" max="20" value="4">
    <span id="size-label">4</span>
    <span id="status">Caricamento...</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>

  <script>
    const video = document.getElementById('video');
    const overlay = document.getElementById('overlay');
    const ctx = overlay.getContext('2d');
    const drawCanvas = document.getElementById('draw-canvas');
    const drawCtx = drawCanvas.getContext('2d');
    const statusEl = document.getElementById('status');

    let prevPinch = null;
    let mode = 'draw';
    let strokeWidth = 4;
    let strokeColor = '#ffd93d';
    let wasPinching = false;
    let shapePoints = [];
    let shapeType = 'rect';
    const SHAPE_TYPES = ['rect', 'circle', 'line'];
    const SHAPE_ICONS = { rect: '⬜', circle: '⭕', line: '╱' };
    const PINCH_THRESHOLD = 35;
    const ERASER_RADIUS = 20;
    const GRID_ROWS = 5;
    const GRID_COLS = 5;
    const NODE_GRAB_RADIUS = 50;
    const DECAY_RADIUS = 3;

    let animaMode = false;
    let gridNodes = [];
    let grabbedNodes = {};
    let prevMode = 'draw';


    function floodFill(canvas, x, y, fillColor) {
      const w = canvas.width, h = canvas.height;
      if (x < 0 || x >= w || y < 0 || y >= h) return;
      const ctx2 = canvas.getContext('2d');
      const img = ctx2.getImageData(0, 0, w, h);
      const data = img.data;
      const idx = (y * w + x) * 4;
      const target = [data[idx], data[idx+1], data[idx+2], data[idx+3]];
      const fill = hexToRgba(fillColor);
      if (target[0] === fill[0] && target[1] === fill[1] && target[2] === fill[2] && target[3] === fill[3]) return;
      const stack = [[x, y]];
      const visited = new Uint8Array(w * h);
      while (stack.length) {
        const [cx, cy] = stack.pop();
        const pi = cy * w + cx;
        if (cx < 0 || cx >= w || cy < 0 || cy >= h || visited[pi]) continue;
        visited[pi] = 1;
        const i = pi * 4;
        if (data[i] !== target[0] || data[i+1] !== target[1] || data[i+2] !== target[2] || data[i+3] !== target[3]) continue;
        data[i] = fill[0]; data[i+1] = fill[1]; data[i+2] = fill[2]; data[i+3] = fill[3];
        stack.push([cx-1,cy], [cx+1,cy], [cx,cy-1], [cx,cy+1]);
      }
      ctx2.putImageData(img, 0, 0);
    }

    function drawShapeOnCanvas(c, pts, type) {
      if (pts.length < 2) return;
      const [a, b] = pts;
      c.strokeStyle = strokeColor;
      c.lineWidth = strokeWidth;
      c.lineCap = 'round';
      c.lineJoin = 'round';
      c.beginPath();
      if (type === 'line') {
        c.moveTo(a.x, a.y);
        c.lineTo(b.x, b.y);
      } else if (type === 'rect') {
        c.rect(a.x, a.y, b.x - a.x, b.y - a.y);
      } else if (type === 'circle') {
        const r = Math.hypot(b.x - a.x, b.y - a.y);
        c.arc(a.x, a.y, r, 0, 2 * Math.PI);
      }
      c.stroke();
    }

    function hexToRgba(hex) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return [r, g, b, 255];
    }

    function texturedTriangle(ctx, img, x0,y0, x1,y1, x2,y2, sx0,sy0, sx1,sy1, sx2,sy2) {
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.closePath();
      ctx.clip();

      const dx = sx1 - sx0, dy = sy1 - sy0;
      const dx2 = sx2 - sx0, dy2 = sy2 - sy0;
      const D = dx * dy2 - dy * dx2;
      if (Math.abs(D) < 1e-6) { ctx.restore(); return; }

      const a = ((x1 - x0) * dy2 - (x2 - x0) * dy) / D;
      const b = ((y1 - y0) * dy2 - (y2 - y0) * dy) / D;
      const c = ((x2 - x0) * dx - (x1 - x0) * dx2) / D;
      const d = ((y2 - y0) * dx - (y1 - y0) * dx2) / D;
      const e = x0 - a * sx0 - c * sy0;
      const f = y0 - b * sx0 - d * sy0;

      ctx.setTransform(a, b, c, d, e, f);
      ctx.drawImage(img, 0, 0);
      ctx.restore();
    }

    function renderDeformedGrid(ctx, img) {
      if (!gridNodes.length) return;
      for (let r = 0; r < GRID_ROWS - 1; r++) {
        for (let c = 0; c < GRID_COLS - 1; c++) {
          const n00 = gridNodes[r][c];
          const n01 = gridNodes[r][c+1];
          const n10 = gridNodes[r+1][c];
          const n11 = gridNodes[r+1][c+1];

          texturedTriangle(ctx, img,
            n00.x, n00.y, n01.x, n01.y, n10.x, n10.y,
            n00.ox, n00.oy, n01.ox, n01.oy, n10.ox, n10.oy
          );
          texturedTriangle(ctx, img,
            n01.x, n01.y, n10.x, n10.y, n11.x, n11.y,
            n01.ox, n01.oy, n10.ox, n10.oy, n11.ox, n11.oy
          );
        }
      }
    }

    const HAND_CONNECTIONS = [
      [0, 1], [0, 5], [0, 17],
      [1, 2], [2, 3], [3, 4],
      [5, 6], [6, 7], [7, 8],
      [9, 10], [10, 11], [11, 12],
      [13, 14], [14, 15], [15, 16],
      [17, 18], [18, 19], [19, 20],
      [5, 9], [9, 13], [13, 17]
    ];

    const FINGER_COLORS = {
      0: '#ffffff',
      1: '#ff6b6b', 2: '#ff6b6b', 3: '#ff6b6b', 4: '#ff6b6b',
      5: '#ffd93d', 6: '#ffd93d', 7: '#ffd93d', 8: '#ffd93d',
      9: '#6bcb77', 10: '#6bcb77', 11: '#6bcb77', 12: '#6bcb77',
      13: '#4d96ff', 14: '#4d96ff', 15: '#4d96ff', 16: '#4d96ff',
      17: '#c084fc', 18: '#c084fc', 19: '#c084fc', 20: '#c084fc',
    };

    function drawHand(hand, color) {
      const kp = hand.keypoints;
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;

      for (const [i, j] of HAND_CONNECTIONS) {
        ctx.beginPath();
        ctx.moveTo(kp[i].x, kp[i].y);
        ctx.lineTo(kp[j].x, kp[j].y);
        ctx.stroke();
      }

      for (let i = 0; i < kp.length; i++) {
        const { x, y } = kp[i];
        const baseColor = FINGER_COLORS[i];
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, 2 * Math.PI);
        ctx.fillStyle = baseColor;
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    function initGrid(w, h) {
      gridNodes = [];
      const marginX = w * 0.05;
      const marginY = h * 0.05;
      const cellW = (w - 2 * marginX) / (GRID_COLS - 1);
      const cellH = (h - 2 * marginY) / (GRID_ROWS - 1);
      for (let r = 0; r < GRID_ROWS; r++) {
        gridNodes[r] = [];
        for (let c = 0; c < GRID_COLS; c++) {
          const ox = marginX + c * cellW;
          const oy = marginY + r * cellH;
          gridNodes[r][c] = { ox, oy, x: ox, y: oy };
        }
      }
    }

    function applyNodeDrag(row, col, dx, dy) {
      if (!gridNodes[row]) return;
      gridNodes[row][col].x += dx;
      gridNodes[row][col].y += dy;
      for (let r = 0; r < GRID_ROWS; r++) {
        for (let c = 0; c < GRID_COLS; c++) {
          if (r === row && c === col) continue;
          const dist = Math.hypot(r - row, c - col);
          if (dist > DECAY_RADIUS) continue;
          const weight = 1 / (dist * dist + 0.1);
          gridNodes[r][c].x += dx * weight;
          gridNodes[r][c].y += dy * weight;
        }
      }
    }

    function enterAnima() {
      const w = drawCanvas.width;
      const h = drawCanvas.height;
      if (!w || !h) return;

      prevMode = mode;
      prevPinch = null;
      shapePoints = [];

      const gc = document.getElementById('grid-canvas');
      gc.width = w;
      gc.height = h;
      initGrid(w, h);
      animaMode = true;
      grabbedNodes = {};
      drawCanvas.style.display = 'none';
      document.getElementById('btn-reset-grid').style.display = '';
      document.getElementById('btn-anima').classList.add('active');
      statusEl.textContent = 'Anima: attiva — pizzica un nodo';
    }

    function exitAnima() {
      if (!animaMode) return;
      animaMode = false;

      const gc = document.getElementById('grid-canvas');
      const gctx = gc.getContext('2d');
      gctx.clearRect(0, 0, gc.width, gc.height);

      const snap = document.createElement('canvas');
      snap.width = drawCanvas.width;
      snap.height = drawCanvas.height;
      snap.getContext('2d').drawImage(drawCanvas, 0, 0);
      drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
      renderDeformedGrid(drawCtx, snap);
      drawCanvas.style.display = '';
      gridNodes = [];
      document.getElementById('btn-reset-grid').style.display = 'none';
      document.getElementById('btn-anima').classList.remove('active');
      setMode(prevMode);
    }

    function resetGrid() {
      if (!animaMode || !gridNodes.length) return;
      for (let r = 0; r < GRID_ROWS; r++) {
        for (let c = 0; c < GRID_COLS; c++) {
          const n = gridNodes[r][c];
          n.x = n.ox;
          n.y = n.oy;
        }
      }
      grabbedNodes = {};
    }

    async function setupCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      video.srcObject = stream;
      await video.play();

    }

    async function main() {
      try {
        await setupCamera();
        statusEl.textContent = 'Caricamento modello...';

        const model = handPoseDetection.SupportedModels.MediaPipeHands;
        const detector = await handPoseDetection.createDetector(model, {
          runtime: 'mediapipe',
          solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/hands',
          modelType: 'full',
          maxHands: 2
        });

        document.getElementById('btn-draw').addEventListener('click', () => {
          mode = 'draw';
          document.getElementById('btn-draw').classList.add('active');
          document.getElementById('btn-eraser').classList.remove('active');
          statusEl.textContent = 'Matita';
        });
        function setMode(m) {
          mode = m;
          document.querySelectorAll('#toolbar button').forEach(b => b.classList.remove('active'));
          const map = { draw: 'btn-draw', erase: 'btn-eraser', fill: 'btn-fill', shape: 'btn-shape' };
          if (map[m]) document.getElementById(map[m]).classList.add('active');
          shapePoints = [];
          const labels = { draw: 'Matita', erase: 'Gomma', fill: 'Riempimento', shape: SHAPE_ICONS[shapeType] };
          statusEl.textContent = labels[m] || m;
        }

        document.getElementById('btn-draw').addEventListener('click', () => setMode('draw'));
        document.getElementById('btn-eraser').addEventListener('click', () => setMode('erase'));
        document.getElementById('btn-fill').addEventListener('click', () => setMode('fill'));
        document.getElementById('btn-shape').addEventListener('click', () => {
          if (mode !== 'shape') {
            shapePoints = [];
            setMode('shape');
          } else {
            const idx = (SHAPE_TYPES.indexOf(shapeType) + 1) % SHAPE_TYPES.length;
            shapeType = SHAPE_TYPES[idx];
            shapePoints = [];
            document.getElementById('btn-shape').textContent = SHAPE_ICONS[shapeType];
            statusEl.textContent = SHAPE_ICONS[shapeType];
          }
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
          drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
        });

        const container = document.getElementById('container');
        document.getElementById('btn-bg').addEventListener('click', () => {
          container.classList.toggle('hide-video');
          document.getElementById('btn-bg').classList.toggle('active');
        });

        document.getElementById('btn-export').addEventListener('click', () => {
          const w = video.videoWidth, h = video.videoHeight;
          const c = document.createElement('canvas');
          c.width = w; c.height = h;
          const tmp = c.getContext('2d');
          tmp.save();
          tmp.scale(-1, 1);
          tmp.translate(-w, 0);
          tmp.drawImage(video, 0, 0);
          tmp.restore();
          tmp.drawImage(drawCanvas, 0, 0);
          const a = document.createElement('a');
          a.download = 'marionetta.png';
          a.href = c.toDataURL();
          a.click();
        });

        document.getElementById('btn-anima').addEventListener('click', () => {
          if (animaMode) {
            exitAnima();
          } else {
            enterAnima();
          }
        });

        document.getElementById('btn-reset-grid').addEventListener('click', resetGrid);

        document.getElementById('color-picker').addEventListener('input', (e) => {
          strokeColor = e.target.value;
        });

        const sizeSlider = document.getElementById('size-slider');
        const sizeLabel = document.getElementById('size-label');
        sizeSlider.addEventListener('input', () => {
          strokeWidth = +sizeSlider.value;
          sizeLabel.textContent = strokeWidth;
        });

        statusEl.textContent = 'Tracking attivo — Matita';

        let canvasesReady = false;

        async function detect() {
          if (!video.videoWidth) return requestAnimationFrame(detect);

          if (!canvasesReady) {
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
            drawCanvas.width = video.videoWidth;
            drawCanvas.height = video.videoHeight;
            canvasesReady = true;
          }

          const hands = await detector.estimateHands(video);

          ctx.clearRect(0, 0, overlay.width, overlay.height);

          if (hands.length === 0) {
            statusEl.textContent = animaMode ? 'Anima: attiva — nessuna mano rilevata' : 'Nessuna mano rilevata';
            prevPinch = null;
            grabbedNodes = {};
          } else {
            statusEl.textContent = animaMode ? `Anima: attiva (${hands.length})` : `Mani: ${hands.length}`;
          }

          let pinching = false;
          const handPinching = {};

          for (const hand of hands) {
            const color = hand.handedness === 'Right' ? '#4d96ff' : '#6bcb77';
            drawHand(hand, color);

            const kp = hand.keypoints;
            const thumb = kp[4];
            const index = kp[8];
            const dx = thumb.x - index.x;
            const dy = thumb.y - index.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < PINCH_THRESHOLD) {
              pinching = true;
              const mx = (thumb.x + index.x) / 2;
              const my = (thumb.y + index.y) / 2;

              if (animaMode) {
                handPinching[hand.handedness] = true;
                if (!grabbedNodes[hand.handedness]) {
                  const grabbedSet = new Set(Object.values(grabbedNodes).map(n => `${n.row},${n.col}`));
                  let minDist = Infinity;
                  let best = null;
                  for (let r = 0; r < GRID_ROWS; r++) {
                    for (let c = 0; c < GRID_COLS; c++) {
                      if (grabbedSet.has(`${r},${c}`)) continue;
                      const n = gridNodes[r][c];
                      const d = Math.hypot(mx - n.x, my - n.y);
                      if (d < minDist && d < NODE_GRAB_RADIUS) {
                        minDist = d;
                        best = { row: r, col: c };
                      }
                    }
                  }
                  if (best) grabbedNodes[hand.handedness] = best;
                }
                if (grabbedNodes[hand.handedness]) {
                  const gn = grabbedNodes[hand.handedness];
                  const n = gridNodes[gn.row][gn.col];
                  const dx = mx - n.x;
                  const dy = my - n.y;
                  applyNodeDrag(gn.row, gn.col, dx, dy);
                }
              } else {
                if (mode === 'shape' && !wasPinching) {
                  shapePoints = [{ x: mx, y: my }];
                }
                if (mode === 'shape') {
                  if (shapePoints.length) shapePoints[1] = { x: mx, y: my };
                }

                if (mode === 'draw') {
                  if (prevPinch) {
                    drawCtx.beginPath();
                    drawCtx.moveTo(prevPinch.x, prevPinch.y);
                    drawCtx.lineTo(mx, my);
                    drawCtx.strokeStyle = strokeColor;
                    drawCtx.lineWidth = strokeWidth;
                    drawCtx.lineCap = 'round';
                    drawCtx.lineJoin = 'round';
                    drawCtx.stroke();
                  }
                  prevPinch = { x: mx, y: my };

                  ctx.beginPath();
                  ctx.arc(mx, my, 14, 0, 2 * Math.PI);
                  ctx.strokeStyle = strokeColor;
                  ctx.lineWidth = 2;
                  ctx.setLineDash([4, 4]);
                  ctx.stroke();
                  ctx.setLineDash([]);
                } else if (mode === 'erase') {
                  drawCtx.clearRect(mx - ERASER_RADIUS, my - ERASER_RADIUS, ERASER_RADIUS * 2, ERASER_RADIUS * 2);
                  ctx.beginPath();
                  ctx.arc(mx, my, ERASER_RADIUS, 0, 2 * Math.PI);
                  ctx.strokeStyle = '#ff4444';
                  ctx.lineWidth = 2;
                  ctx.stroke();
                } else if (mode === 'fill') {
                  floodFill(drawCanvas, Math.round(mx), Math.round(my), strokeColor);
                  ctx.beginPath();
                  ctx.arc(mx, my, 20, 0, 2 * Math.PI);
                  ctx.strokeStyle = strokeColor;
                  ctx.lineWidth = 2;
                  ctx.setLineDash([4, 4]);
                  ctx.stroke();
                  ctx.setLineDash([]);
                }
              }
            }
          }

          if (animaMode) {
            const gc = document.getElementById('grid-canvas');
            const gctx = gc.getContext('2d');
            gctx.clearRect(0, 0, gc.width, gc.height);
            renderDeformedGrid(gctx, drawCanvas);
            for (let r = 0; r < GRID_ROWS; r++) {
              for (let c = 0; c < GRID_COLS; c++) {
                const n = gridNodes[r][c];
                gctx.beginPath();
                gctx.arc(n.x, n.y, 6, 0, 2 * Math.PI);
                const isGrabbed = Object.values(grabbedNodes).some(gn => gn.row === r && gn.col === c);
                gctx.fillStyle = isGrabbed ? '#ffd93d' : 'rgba(255,255,255,0.85)';
                gctx.fill();
                gctx.strokeStyle = 'rgba(0,0,0,0.5)';
                gctx.lineWidth = 1.5;
                gctx.stroke();
              }
            }
          }

          if (!animaMode && mode === 'shape') {
            if (shapePoints.length === 2) {
              drawShapeOnCanvas(ctx, shapePoints, shapeType);
            }
            if (wasPinching && !pinching && shapePoints.length) {
              drawShapeOnCanvas(drawCtx, shapePoints, shapeType);
              shapePoints = [];
            }
          }

          if (!pinching) prevPinch = null;
          if (animaMode) {
            for (const h of Object.keys(grabbedNodes)) {
              if (!handPinching[h]) delete grabbedNodes[h];
            }
          }
          wasPinching = pinching;

          requestAnimationFrame(detect);
        }

        detect();
      } catch (err) {
        statusEl.textContent = 'Errore: ' + err.message;
        console.error(err);
      }
    }

    main();
  </script>
